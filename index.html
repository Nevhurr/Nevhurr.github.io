<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src https://cdn.jsdelivr.net 'unsafe-inline';
    style-src 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data: blob: https://*.githubusercontent.com;
    connect-src https://pgvaffnvcuakanktpfqq.supabase.co;
    object-src 'none';
    base-uri 'none';
    form-action 'none';
    frame-ancestors 'none';
    font-src 'self' data: https://fonts.gstatic.com;
  ">
  <title>MahJONJ — Gacha Edition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fbf5e6;
      --lacquer-red: #8b1e2f;
      --gold: #d4af37;
      --gold-light: #f5e7c1;
      --peach: #ffb38a;
      --navy: #1a1b2f;
      --brown: #4a2c2a;
      --text: #3d2422;
      --glow: 0 0 15px rgba(212, 175, 55, 0.4);
    }

    body {
      font-family: 'M PLUS Rounded 1c', 'Segoe UI', system-ui, sans-serif;
      background: #11101b;
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(26, 27, 47, 0.8) 0%, rgba(13, 13, 26, 1) 100%),
        url('data:image/svg+xml,<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M0 0l40 40M40 0L0 40" stroke="%23222" stroke-width="0.5" fill="none" opacity="0.2"/></svg>');
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .page { max-width: 1140px; margin: 0 auto; position: relative; z-index: 2; }

    /* Mascots & Floating Elements */
    .ichihime-mascot {
      position: fixed;
      right: -40px;
      bottom: -20px;
      width: 450px;
      pointer-events: none;
      z-index: 1;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
      opacity: 0.95;
    }

    /* Header Styling */
    header { 
      margin-bottom: 40px; 
      text-align: center;
      position: relative;
    }
    header h1 {
      font-size: 3.5rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: #ff8800;
      background: linear-gradient(180deg, #ffcc33 0%, #ff8800 50%, #ee4400 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      /* Using dropshadow as a high-performance external outline */
      filter: 
        drop-shadow(2px 0 0 #000) 
        drop-shadow(-2px 0 0 #000) 
        drop-shadow(0 2px 0 #000) 
        drop-shadow(0 -2px 0 #000)
        drop-shadow(0 6px 0 rgba(0,0,0,0.25));
      margin-bottom: -10px;
    }
    header .jp-sub {
      font-size: 1.2rem;
      color: var(--gold-light);
      font-weight: 500;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      background: rgba(139, 30, 47, 0.8);
      display: inline-block;
      padding: 2px 20px;
      border-radius: 20px;
      border: 1px solid var(--gold);
    }

    /* Gacha Panel */
    .card {
      background: var(--cream);
      background-image: 
        linear-gradient(rgba(139, 30, 47, 0.02) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(139, 30, 47, 0.02) 1px, transparent 1px);
      background-size: 24px 24px;
      border: 3px solid var(--lacquer-red);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 24px;
      box-shadow: 
        0 15px 40px -10px rgba(0,0,0,0.6),
        inset 0 0 40px rgba(212,175,55,0.1);
      position: relative;
      overflow: hidden;
    }

    .card-label {
      font-size: 1rem;
      font-weight: 800;
      color: var(--lacquer-red);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
    }
    .card-label::before {
      content: '✦';
      color: var(--gold);
    }

    /* Inputs */
    textarea {
      width: 100%;
      height: 220px;
      background: #fdfaf2;
      border: 3px solid #e0d0b0;
      border-radius: 20px;
      color: var(--brown);
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.95rem;
      padding: 18px;
      resize: none;
      outline: none;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
      transition: all 0.2s;
    }
    textarea:focus { border-color: var(--peach); background: #fff; }

    .manual-grid input {
      width: 100%;
      background: #fdfaf2;
      border: 3px solid #e0d0b0;
      border-radius: 12px;
      color: var(--brown);
      padding: 10px 14px;
      font-size: 1rem;
      font-weight: 500;
      outline: none;
    }
    .manual-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 100px;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--lacquer-red);
      font-weight: 800;
      font-size: 0.85rem;
    }
    .manual-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 100px;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* Buttons */
    .btn-row { display: flex; gap: 14px; margin-top: 20px; flex-wrap: wrap; }

    button {
      padding: 10px 24px;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
      position: relative;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 
        0 6px 20px -5px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
    }
    button:hover {
      transform: translateY(-3px) scale(1.03);
      filter: brightness(1.1);
      box-shadow: 0 12px 25px -8px rgba(0,0,0,0.6);
    }
    button:active { 
      transform: translateY(1px) scale(0.98); 
      box-shadow: 0 4px 10px -3px rgba(0,0,0,0.5); 
    }

    .btn-add { background: linear-gradient(135deg, #2b8a3e 0%, #1b5e20 100%); border-bottom: 3px solid #0a3d12; }
    .btn-reset { background: linear-gradient(135deg, #f59f00 0%, #d97706 100%); border-bottom: 3px solid #92400e; }
    .btn-sample { background: linear-gradient(135deg, #4a4e69 0%, #22223b 100%); border-bottom: 3px solid #1a1a2e; }
    .btn-export { 
      background: linear-gradient(135deg, #c2255c 0%, #862e9c 100%); 
      border-bottom: 3px solid #5f193e;
      margin-left: auto;
    }

    .btn-add span, .btn-reset span, .btn-sample span, .btn-export span {
      font-size: 1.2rem;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
    }

    button:hover { filter: brightness(1.1); transform: translateY(-2px); }

    .error {
      background: #fff0f0;
      color: #c92a2a;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      border: 2px solid #ffc9c9;
      margin-top: 15px;
    }

    /* Results Rendering */
    .standings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .player-card {
      background: white;
      border: 2px solid var(--brown);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      position: relative;
      background-image: linear-gradient(180deg, #fff 0%, #fdfaf2 100%);
      box-shadow: 
        0 10px 25px -5px rgba(0,0,0,0.3),
        inset 0 0 0 1px rgba(255,255,255,1);
    }
    .player-card.first { 
      border-color: var(--gold); 
      background: linear-gradient(180deg, #fffcf0 0%, #fbf5e6 100%);
      box-shadow: 
        0 15px 35px -5px rgba(212,175,55,0.4),
        0 0 0 2px var(--gold-light);
    }
    .player-card.first::before {
      content: '👑';
      position: absolute;
      top: -20px; left: 50%;
      transform: translateX(-50%);
      font-size: 2rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }
    .prank { font-weight: 800; color: var(--gold); font-size: 1rem; margin-bottom: 5px; }
    .pname { font-size: 1.4rem; font-weight: 800; color: var(--navy); margin-bottom: 10px; }
    .pscore { font-size: 2.2rem; font-weight: 800; color: var(--lacquer-red); }
    .pdelta { font-weight: 700; font-size: 1.1rem; }

    .top-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      gap: 24px;
      margin-bottom: 30px;
    }

    .meta-bar { font-weight: 700; color: var(--gold-light); }
    .chart-wrapper { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; height: 450px; border: 2px solid rgba(212,175,55,0.2); }

    /* Global History Styles */
    .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; color: var(--gold-light); font-size: 0.9rem; }
    .history-table th { text-align: left; padding: 8px; border-bottom: 2px solid var(--gold); color: var(--gold); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
    .history-table td { padding: 10px 8px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
    .history-date { opacity: 0.6; font-size: 0.8rem; }
    .history-players { font-weight: 700; }
    .loading-spinner { text-align: center; padding: 40px; color: var(--gold); font-weight: 700; letter-spacing: 2px; }

    @media (max-width: 1000px) {
      .top-grid { grid-template-columns: 1fr; }
      .ichihime-mascot { display: none; }
    }
    @media (max-width: 600px) {
      .standings-grid { grid-template-columns: 1fr; }
      header h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
<img src="assets/ichihime.png" class="ichihime-mascot" alt="Ichihime Mascot">

<div class="page">
  <header>
    <h1>PARLOIR RUBIS SAPHIR</h1>
    <div class="jp-sub">MahJONJ Parser · 3-Seat Edition</div>
  </header>

  <div class="card" style="margin-bottom: 32px; background: rgba(13, 13, 26, 0.6); border-color: var(--gold);">
    <div class="card-label" style="display: flex; justify-content: space-between; align-items: center;">
      <span>🌐 GLOBAL HALL OF FAME</span>
      <span id="syncStatus" style="font-size: 0.7rem; opacity: 0.7;">CONNECTED</span>
    </div>
    <div id="globalHistory">
      <div class="loading-spinner">RETRACING HISTORY...</div>
    </div>
  </div>

  <div class="top-grid" style="grid-template-columns: 1fr; max-width: 600px; margin-left: auto; margin-right: auto;">
    <div class="card">
      <div class="card-label">Custom Entry</div>
      <div class="manual-head"><div>NAME</div><div>SCORE</div></div>
      <div class="manual-grid"><input id="mName1" maxlength="40" placeholder="Player 1"><input id="mDelta1" maxlength="12" placeholder="+0.0"></div>
      <div class="manual-grid"><input id="mName2" maxlength="40" placeholder="Player 2"><input id="mDelta2" maxlength="12" placeholder="+0.0"></div>
      <div class="manual-grid"><input id="mName3" maxlength="40" placeholder="Player 3"><input id="mDelta3" maxlength="12" placeholder="+0.0"></div>
      <p class="error" id="manualError" style="display:none"></p>
      <div class="btn-row">
        <button class="btn-add" onclick="addManualGame()"><span>+</span> ADD</button>
        <button class="btn-sample" onclick="loadSample()"><span>📖</span> LOAD SAMPLE</button>
        <button class="btn-reset" onclick="clearManualGames()"><span>↺</span> RESET</button>
      </div>
      <div id="manualMeta" style="margin-top:15px; font-weight:700; color:var(--lacquer-red); font-size:0.85rem"></div>
    </div>
  </div>

  <div id="results">
    <div class="standings-grid" id="standings"></div>
    <div class="card" style="background:var(--navy); border-color:var(--gold); color:white">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap: wrap; gap: 10px;">
        <div class="meta-bar" id="meta"></div>
        <div style="display:flex; gap: 10px;">
          <button class="btn-export" style="background: linear-gradient(135deg, #2b8a3e 0%, #1b5e20 100%); border-color: #0c3b12;" onclick="submitToGlobal(this)"><span>🌍</span> PUBLISH</button>
          <button class="btn-export" onclick="exportGraphCard()"><span>🖼️</span> EXPORT CARD</button>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

</div>

// ── Shared State ──────────────────
let chart = null;
let manualGames = [];
let currentMerged = { dataPoints: [], players: [] };
let globalChart = null;

// ── Helpers ──────────────────
function normalizeName(name) {
  const cleaned = String(name).trim().replace(/[^A-Za-z\u00C0-\u024F0-9 '\-]/g, '').replace(/\s+/g, ' ').trim().slice(0, 50);
  if (!cleaned) return '';
  return cleaned.split(' ').filter(Boolean).map(part => part.charAt(0).toUpperCase() + part.slice(1).toLowerCase()).join(' ');
}

function escHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function fmtDate(d) {
  if (!d) return '';
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }) + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function fmtScore(v) {
  if (v === undefined || v === null) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(1);
}

function scoreClass(v) {
  return v > 0 ? 'positive' : v < 0 ? 'negative' : 'neutral';
}

// ── Build Data ──────────────────
function buildMergedData() {
  const playersSet = new Set();
  for (const game of manualGames) {
    Object.keys(game.deltas).forEach(p => playersSet.add(p));
  }
  const players = [...playersSet];
  const mergedPoints = [];

  if (manualGames.length > 0) {
    const zeroScores = Object.fromEntries(players.map(p => [p, 0]));
    mergedPoints.push({ date: null, scores: zeroScores });

    let currentScores = { ...zeroScores };
    for (const game of manualGames) {
      for (const [name, delta] of Object.entries(game.deltas)) {
        currentScores[name] = (currentScores[name] || 0) + delta;
      }
      mergedPoints.push({ date: game.date, scores: { ...currentScores } });
    }
  }

  return { dataPoints: mergedPoints, players };
}

function getRankingResults(dataPoints, players) {
  if (dataPoints.length === 0) return [];
  const last = dataPoints[dataPoints.length - 1];
  const prev = dataPoints.length >= 2 ? dataPoints[dataPoints.length - 2] : null;
  return players.map(p => ({
    name: p,
    total: last.scores[p] ?? 0,
    delta: prev ? (last.scores[p] ?? 0) - (prev.scores[p] ?? 0) : 0
  })).sort((a, b) => b.total - a.total);
}

// ── Rendering ──────────────────
function renderCurrentState() {
  const merged = buildMergedData();
  currentMerged = merged;
  if (merged.dataPoints.length < 2 || merged.players.length < 2) {
    document.getElementById('results').style.display = 'none';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }
  render(merged.dataPoints, merged.players);
  document.getElementById('results').style.display = 'block';
}

const PALETTE = ['#4fc3f7', '#ef9a9a', '#a5d6a7', '#ffcc80', '#ce93d8'];

function render(dataPoints, players) {
  const colorMap = Object.fromEntries(players.map((p, i) => [p, PALETTE[i % PALETTE.length]]));
  const labels = dataPoints.map((_, i) => i === 0 ? 'Start' : `G${i}`);
  const latestIndex = dataPoints.length - 1;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels,
      datasets: players.map(p => ({
        label: p,
        data: dataPoints.map(dp => dp.scores[p] ?? null),
        borderColor: colorMap[p],
        backgroundColor: colorMap[p] + '18',
        tension: 0.35,
        pointRadius: ctx => ctx.dataIndex === latestIndex ? 10 : 4,
        pointHoverRadius: ctx => ctx.dataIndex === latestIndex ? 14 : 7,
        pointBorderWidth: ctx => ctx.dataIndex === latestIndex ? 4 : 1,
        pointBackgroundColor: ctx => ctx.dataIndex === latestIndex ? '#fff' : colorMap[p],
        pointBorderColor: colorMap[p],
        borderWidth: 3,
        fill: false,
        spanGaps: true,
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#f5e7c1', font: { size: 14, weight: '700', family: "'M PLUS Rounded 1c', sans-serif" }, usePointStyle: true } },
        tooltip: {
          backgroundColor: '#1a1b2f', borderColor: '#d4af37', borderWidth: 2, cornerRadius: 12, padding: 15,
          callbacks: {
            title: items => {
              const dp = dataPoints[items[0].dataIndex];
              const gameLabel = items[0].dataIndex === 0 ? 'Start' : `Game ${items[0].dataIndex}`;
              return dp.date ? `${gameLabel}  ·  ${fmtDate(dp.date)}` : gameLabel;
            },
            label: item => `  ${item.dataset.label}: ${fmtScore(item.raw)}`
          }
        }
      },
      scales: {
        x: { ticks: { color: '#8890c0' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#8890c0', callback: v => (v >= 0 ? '+' : '') + v }, grid: { color: ctx => ctx.tick.value === 0 ? 'rgba(212,175,55,0.4)' : 'rgba(255,255,255,0.05)', lineWidth: ctx => ctx.tick.value === 0 ? 2 : 1 } }
      }
    }
  });

  const sorted = getRankingResults(dataPoints, players);
  const rankLabels = ['1ST PLACE', '2ND PLACE', '3RD PLACE', '4TH PLACE', '5TH PLACE'];

  document.getElementById('standings').innerHTML = sorted.map((p, i) =>
    `<div class="player-card${i === 0 ? ' first' : ''}">
      <div class="prank">${rankLabels[i] || (i + 1) + 'TH'}</div>
      <div class="pname" style="color:var(--lacquer-red)">${escHtml(p.name)}</div>
      <div class="pscore" style="color:${escHtml(colorMap[p.name])}">${fmtScore(p.total)}</div>
      <div class="pdelta" style="margin-top:10px; font-size: 0.9rem; color:var(--brown)">LAST GAME <span class="${scoreClass(p.delta)}" style="font-weight:800">${fmtScore(p.delta)}</span></div>
    </div>`
  ).join('');

  document.getElementById('meta').textContent = `TOTAL ${dataPoints.length - 1} GAMES RECORDED`;
}

// ── Export ──────────────────
function exportGraphCard() {
  if (!chart || currentMerged.dataPoints.length < 2) return;
  function loadImg(src) { return new Promise(res => { const img = new Image(); img.onload = () => res(img); img.onerror = () => res(null); img.src = src; }); }
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  Promise.all([loadImg(pick(EMOTES_1ST)), loadImg(pick(EMOTES_2ND)), loadImg(pick(EMOTES_3RD))])
    .then(emotes => _drawCard(emotes))
    .catch(err => console.error('Export failed:', err));
}

function _drawCard(emotes) {
  const { dataPoints, players } = currentMerged;
  const latestResults = getRankingResults(dataPoints, players);
  const gameNumber = dataPoints.length - 1;
  const CW = 1920, CH = 1080;
  const card = document.createElement('canvas'); card.width = CW; card.height = CH;
  const ctx = card.getContext('2d');

  const bg = ctx.createLinearGradient(0, 0, CW, CH);
  bg.addColorStop(0, '#2d0a0e'); bg.addColorStop(0.5, '#4a1c1c'); bg.addColorStop(1, '#1a1b2f');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, CW, CH);

  ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 8; ctx.strokeRect(40, 40, CW - 80, CH - 80);

  ctx.save();
  ctx.font = 'bold 90px "M PLUS Rounded 1c", sans-serif';
  const title = '✦ PARLOIR RUBIS SAPHIR ✦';
  const tGrad = ctx.createLinearGradient(100, 60, 100, 150);
  tGrad.addColorStop(0, '#ffcc33'); tGrad.addColorStop(0.5, '#ff8800'); tGrad.addColorStop(1, '#ee4400');
  ctx.fillStyle = tGrad; ctx.fillText(title, 100, 140);
  ctx.restore();

  latestResults.slice(0, 3).forEach((p, i) => {
    const cx = 100 + i * 600; const cy = 240;
    ctx.fillStyle = '#fbf5e6'; ctx.fillRect(cx, cy, 550, 320);
    ctx.fillStyle = '#8b1e2f'; ctx.font = '800 52px sans-serif'; ctx.fillText(p.name, cx + 25, cy + 110);
    ctx.fillStyle = '#4a2c2a'; ctx.font = '800 50px sans-serif'; ctx.fillText(fmtScore(p.total), cx + 25, cy + 250);
    if (emotes[i]) ctx.drawImage(emotes[i], cx + 350, cy + 50, 180, 180);
  });

  ctx.drawImage(chart.canvas, 100, 600, CW - 200, 400);

  const a = document.createElement('a'); a.href = card.toDataURL('image/png'); a.download = `mahjonj-report-game${gameNumber}.png`; a.click();
}

// ── Manual Entries ──────────────────
function updateManualMeta() {
  const el = document.getElementById('manualMeta');
  if (manualGames.length === 0) { el.textContent = 'No manual games yet.'; return; }
  const latest = manualGames[manualGames.length - 1];
  const latestText = Object.entries(latest.deltas).map(([p, v]) => `${p} ${fmtScore(v)}`).join(' | ');
  el.textContent = `${manualGames.length} games. Latest: ${latestText}`;
}

function addManualGame() {
  const err = document.getElementById('manualError');
  err.style.display = 'none';
  const rows = [1, 2, 3].map(i => ({
    name: normalizeName(document.getElementById(`mName${i}`).value),
    deltaRaw: document.getElementById(`mDelta${i}`).value.trim()
  }));
  if (rows.some(r => !r.name || !r.deltaRaw)) {
    err.textContent = 'Fill all 3 player names and scores.';
    err.style.display = 'block';
    return;
  }
  const deltas = {};
  for (const row of rows) {
    const v = parseFloat(row.deltaRaw.replace(',', '.'));
    if (!Number.isFinite(v)) { err.textContent = 'Invalid numbers.'; err.style.display = 'block'; return; }
    deltas[row.name] = v;
  }
  manualGames.push({ date: new Date(), deltas });
  updateManualMeta();
  renderCurrentState();
}

function loadSample() {
  manualGames = [
    { date: new Date(Date.now() - 3600000), deltas: { 'Yip': -177, 'Nevor': 23.8, 'Tianshi': 153.2 } },
    { date: new Date(Date.now() - 1800000), deltas: { 'Yip': -21.8, 'Nevor': 26.9, 'Tianshi': -5.1 } }
  ];
  updateManualMeta();
  renderCurrentState();
}

function clearManualGames() {
  manualGames = [];
  updateManualMeta();
  renderCurrentState();
}

// ── Supabase ──────────────────
async function fetchGlobalHistory() {
  if (!sbClient) return;
  const container = document.getElementById('globalHistory');
  try {
    const { data, error } = await sbClient.from('matches').select('*').order('created_at', { ascending: true }).limit(30);
    if (error) throw error;
    if (!data || data.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding: 20px; opacity: 0.5;">No global matches yet.</div>';
      return;
    }

    const playersSet = new Set();
    data.forEach(m => m.player_data.forEach(p => playersSet.add(p.name)));
    const players = [...playersSet];

    const labels = data.map((m, i) => {
      const d = new Date(m.created_at);
      return `S${i + 1} · ` + d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
    });

    const datasets = players.map((name, idx) => {
      const color = PALETTE[idx % PALETTE.length];
      return {
        label: name,
        data: data.map(m => {
          const entry = m.player_data.find(p => p.name === name);
          return (entry && m.match_count) ? +(entry.delta / m.match_count).toFixed(2) : null;
        }),
        borderColor: color,
        backgroundColor: color + '18',
        tension: 0.35,
        pointRadius: 6,
        pointHoverRadius: 10,
        pointBorderWidth: 3,
        pointBackgroundColor: '#fff',
        pointBorderColor: color,
        borderWidth: 3,
        fill: false,
        spanGaps: true,
      };
    });

    container.innerHTML = '<div class="chart-wrapper" style="height: 380px;"><canvas id="globalHistoryChart"></canvas></div>';

    if (globalChart) globalChart.destroy();
    globalChart = new Chart(document.getElementById('globalHistoryChart'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#f5e7c1', font: { size: 13, weight: '700', family: "'M PLUS Rounded 1c', sans-serif" }, usePointStyle: true } },
          tooltip: {
            backgroundColor: '#1a1b2f', borderColor: '#d4af37', borderWidth: 2, cornerRadius: 12, padding: 12,
            callbacks: {
              title: items => {
                const m = data[items[0].dataIndex];
                return `Session ${items[0].dataIndex + 1}  ·  ${new Date(m.created_at).toLocaleDateString('fr-FR')}  ·  ${m.match_count} games`;
              },
              label: item => `  ${item.dataset.label}: ${fmtScore(item.raw)} / game`
            }
          }
        },
        scales: {
          x: { ticks: { color: '#8890c0' }, grid: { color: 'rgba(255,255,255,0.05)' } },
          y: { title: { display: true, text: 'avg score / game', color: '#8890c0', font: { size: 11 } }, ticks: { color: '#8890c0', callback: v => (v >= 0 ? '+' : '') + v }, grid: { color: ctx => ctx.tick.value === 0 ? 'rgba(212,175,55,0.4)' : 'rgba(255,255,255,0.05)', lineWidth: ctx => ctx.tick.value === 0 ? 2 : 1 } }
        }
      }
    });
  } catch (err) { container.innerHTML = '<div>Error loading history.</div>'; }
}

async function submitToGlobal(btn) {
  if (!sbClient || !currentMerged.dataPoints.length) return;
  const original = btn.innerHTML;
  try {
    btn.disabled = true; btn.innerHTML = 'UPLOADING...';
    const latest = getRankingResults(currentMerged.dataPoints, currentMerged.players);
    const { error } = await sbClient.from('matches').insert([{ player_data: latest.map(p => ({ name: p.name, delta: p.total })), match_count: currentMerged.dataPoints.length - 1 }]);
    if (error) throw error;
    btn.innerHTML = 'PUBLISHED!';
    fetchGlobalHistory();
    setTimeout(() => { btn.disabled = false; btn.innerHTML = original; }, 3000);
  } catch (err) { alert('Upload failed.'); btn.disabled = false; btn.innerHTML = original; }
}

document.addEventListener('DOMContentLoaded', fetchGlobalHistory);
</script>
