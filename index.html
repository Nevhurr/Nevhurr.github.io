<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src https://cdn.jsdelivr.net 'unsafe-inline';
    style-src 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data: blob: https://*.githubusercontent.com;
    connect-src https://pgvaffnvcuakanktpfqq.supabase.co;
    object-src 'none';
    base-uri 'none';
    form-action 'none';
    frame-ancestors 'none';
    font-src 'self' data: https://fonts.gstatic.com;
  ">
  <title>MahJONJ — Gacha Edition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fbf5e6;
      --lacquer-red: #8b1e2f;
      --gold: #d4af37;
      --gold-light: #f5e7c1;
      --peach: #ffb38a;
      --navy: #1a1b2f;
      --brown: #4a2c2a;
      --text: #3d2422;
      --glow: 0 0 15px rgba(212, 175, 55, 0.4);
    }

    body {
      font-family: 'M PLUS Rounded 1c', 'Segoe UI', system-ui, sans-serif;
      background: #11101b;
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(26, 27, 47, 0.8) 0%, rgba(13, 13, 26, 1) 100%),
        url('data:image/svg+xml,<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M0 0l40 40M40 0L0 40" stroke="%23222" stroke-width="0.5" fill="none" opacity="0.2"/></svg>');
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .page { max-width: 1140px; margin: 0 auto; position: relative; z-index: 2; }

    /* Mascots & Floating Elements */
    .ichihime-mascot {
      position: fixed;
      right: -40px;
      bottom: -20px;
      width: 450px;
      pointer-events: none;
      z-index: 1;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
      opacity: 0.95;
    }

    /* Header Styling */
    header { 
      margin-bottom: 40px; 
      text-align: center;
      position: relative;
    }
    header h1 {
      font-size: 3.5rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: #ff8800;
      background: linear-gradient(180deg, #ffcc33 0%, #ff8800 50%, #ee4400 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      /* Using dropshadow as a high-performance external outline */
      filter: 
        drop-shadow(2px 0 0 #000) 
        drop-shadow(-2px 0 0 #000) 
        drop-shadow(0 2px 0 #000) 
        drop-shadow(0 -2px 0 #000)
        drop-shadow(0 6px 0 rgba(0,0,0,0.25));
      margin-bottom: -10px;
    }
    header .jp-sub {
      font-size: 1.2rem;
      color: var(--gold-light);
      font-weight: 500;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      background: rgba(139, 30, 47, 0.8);
      display: inline-block;
      padding: 2px 20px;
      border-radius: 20px;
      border: 1px solid var(--gold);
    }

    /* Gacha Panel */
    .card {
      background: var(--cream);
      background-image: 
        linear-gradient(rgba(139, 30, 47, 0.02) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(139, 30, 47, 0.02) 1px, transparent 1px);
      background-size: 24px 24px;
      border: 3px solid var(--lacquer-red);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 24px;
      box-shadow: 
        0 15px 40px -10px rgba(0,0,0,0.6),
        inset 0 0 40px rgba(212,175,55,0.1);
      position: relative;
      overflow: hidden;
    }

    .card-label {
      font-size: 1rem;
      font-weight: 800;
      color: var(--lacquer-red);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
    }
    .card-label::before {
      content: '✦';
      color: var(--gold);
    }

    /* Inputs */
    textarea {
      width: 100%;
      height: 220px;
      background: #fdfaf2;
      border: 3px solid #e0d0b0;
      border-radius: 20px;
      color: var(--brown);
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.95rem;
      padding: 18px;
      resize: none;
      outline: none;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
      transition: all 0.2s;
    }
    textarea:focus { border-color: var(--peach); background: #fff; }

    .manual-grid input {
      width: 100%;
      background: #fdfaf2;
      border: 3px solid #e0d0b0;
      border-radius: 12px;
      color: var(--brown);
      padding: 10px 14px;
      font-size: 1rem;
      font-weight: 500;
      outline: none;
    }
    .manual-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 100px;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--lacquer-red);
      font-weight: 800;
      font-size: 0.85rem;
    }
    .manual-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 100px;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* Buttons */
    .btn-row { display: flex; gap: 14px; margin-top: 20px; flex-wrap: wrap; }

    button {
      padding: 10px 24px;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
      position: relative;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 
        0 6px 20px -5px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
    }
    button:hover {
      transform: translateY(-3px) scale(1.03);
      filter: brightness(1.1);
      box-shadow: 0 12px 25px -8px rgba(0,0,0,0.6);
    }
    button:active { 
      transform: translateY(1px) scale(0.98); 
      box-shadow: 0 4px 10px -3px rgba(0,0,0,0.5); 
    }

    .btn-parse { background: linear-gradient(135deg, #e63946 0%, #a81c2f 100%); border-bottom: 3px solid #6b121e; }
    .btn-sample { background: linear-gradient(135deg, #4a4e69 0%, #22223b 100%); border-bottom: 3px solid #1a1a2e; }
    .btn-clear { background: linear-gradient(135deg, #6c757d 0%, #343a40 100%); border-bottom: 3px solid #212529; }
    .btn-add { background: linear-gradient(135deg, #2b8a3e 0%, #1b5e20 100%); border-bottom: 3px solid #0a3d12; }
    .btn-reset { background: linear-gradient(135deg, #f59f00 0%, #d97706 100%); border-bottom: 3px solid #92400e; }
    .btn-export { 
      background: linear-gradient(135deg, #c2255c 0%, #862e9c 100%); 
      border-bottom: 3px solid #5f193e;
      margin-left: auto;
    }

    .btn-parse span, .btn-sample span, .btn-clear span, .btn-add span, .btn-reset span, .btn-export span {
      font-size: 1.2rem;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
    }

    button:hover { filter: brightness(1.1); transform: translateY(-2px); }

    .error {
      background: #fff0f0;
      color: #c92a2a;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      border: 2px solid #ffc9c9;
      margin-top: 15px;
    }

    /* Results Rendering */
    .standings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .player-card {
      background: white;
      border: 2px solid var(--brown);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      position: relative;
      background-image: linear-gradient(180deg, #fff 0%, #fdfaf2 100%);
      box-shadow: 
        0 10px 25px -5px rgba(0,0,0,0.3),
        inset 0 0 0 1px rgba(255,255,255,1);
    }
    .player-card.first { 
      border-color: var(--gold); 
      background: linear-gradient(180deg, #fffcf0 0%, #fbf5e6 100%);
      box-shadow: 
        0 15px 35px -5px rgba(212,175,55,0.4),
        0 0 0 2px var(--gold-light);
    }
    .player-card.first::before {
      content: '👑';
      position: absolute;
      top: -20px; left: 50%;
      transform: translateX(-50%);
      font-size: 2rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }
    .prank { font-weight: 800; color: var(--gold); font-size: 1rem; margin-bottom: 5px; }
    .pname { font-size: 1.4rem; font-weight: 800; color: var(--navy); margin-bottom: 10px; }
    .pscore { font-size: 2.2rem; font-weight: 800; color: var(--lacquer-red); }
    .pdelta { font-weight: 700; font-size: 1.1rem; }

    .top-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      gap: 24px;
      margin-bottom: 30px;
    }

    .meta-bar { font-weight: 700; color: var(--gold-light); }
    .chart-wrapper { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; height: 450px; border: 2px solid rgba(212,175,55,0.2); }

    /* Global History Styles */
    .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; color: var(--gold-light); font-size: 0.9rem; }
    .history-table th { text-align: left; padding: 8px; border-bottom: 2px solid var(--gold); color: var(--gold); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
    .history-table td { padding: 10px 8px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
    .history-date { opacity: 0.6; font-size: 0.8rem; }
    .history-players { font-weight: 700; }
    .loading-spinner { text-align: center; padding: 40px; color: var(--gold); font-weight: 700; letter-spacing: 2px; }

    @media (max-width: 1000px) {
      .top-grid { grid-template-columns: 1fr; }
      .ichihime-mascot { display: none; }
    }
    @media (max-width: 600px) {
      .standings-grid { grid-template-columns: 1fr; }
      header h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
<img src="assets/ichihime.png" class="ichihime-mascot" alt="Ichihime Mascot">

<div class="page">
  <header>
    <h1>PARLOIR RUBIS SAPHIR</h1>
    <div class="jp-sub">MahJONJ Parser · 3-Seat Edition</div>
  </header>

  <div class="top-grid">
    <div class="card">
      <div class="card-label">Discord Data Input</div>
      <textarea id="input" placeholder="Paste Discord score messages here..."></textarea>
      <p class="error" id="error" style="display:none"></p>
      <div class="btn-row">
        <button class="btn-parse" onclick="run()"><span>⚡</span> ANALYZE</button>
        <button class="btn-sample" onclick="loadSample()"><span>📖</span> SAMPLE</button>
        <button class="btn-clear" onclick="clearAll()"><span>🗑️</span> CLEAR</button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Custom Entry</div>
      <div class="manual-head"><div>NAME</div><div>SCORE</div></div>
      <div class="manual-grid"><input id="mName1" maxlength="40" placeholder="Player 1"><input id="mDelta1" maxlength="12" placeholder="+0.0"></div>
      <div class="manual-grid"><input id="mName2" maxlength="40" placeholder="Player 2"><input id="mDelta2" maxlength="12" placeholder="+0.0"></div>
      <div class="manual-grid"><input id="mName3" maxlength="40" placeholder="Player 3"><input id="mDelta3" maxlength="12" placeholder="+0.0"></div>
      <p class="error" id="manualError" style="display:none"></p>
      <div class="btn-row">
        <button class="btn-add" onclick="addManualGame()"><span>+</span> ADD</button>
        <button class="btn-reset" onclick="clearManualGames()"><span>↺</span> RESET</button>
      </div>
      <div id="manualMeta" style="margin-top:15px; font-weight:700; color:var(--lacquer-red); font-size:0.85rem"></div>
    </div>
  </div>

  <div id="results">
    <div class="standings-grid" id="standings"></div>
    <div class="card" style="background:var(--navy); border-color:var(--gold); color:white">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap: wrap; gap: 10px;">
        <div class="meta-bar" id="meta"></div>
        <div style="display:flex; gap: 10px;">
          <button class="btn-export" style="background: linear-gradient(135deg, #2b8a3e 0%, #1b5e20 100%); border-color: #0c3b12;" onclick="submitToGlobal(this)"><span>🌍</span> PUBLISH</button>
          <button class="btn-export" onclick="exportGraphCard()"><span>🖼️</span> EXPORT CARD</button>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top: 30px; background: rgba(13, 13, 26, 0.6); border-style: dashed; border-width: 2px;">
    <div class="card-label" style="display: flex; justify-content: space-between; align-items: center;">
      <span>🌐 GLOBAL HALL OF FAME</span>
      <span id="syncStatus" style="font-size: 0.7rem; opacity: 0.7;">CONNECTED</span>
    </div>
    <div id="globalHistory">
      <div class="loading-spinner">RETRACING HISTORY...</div>
    </div>
  </div>
</div>

// ── Parser ────────────────────────────────────────────────────────────────────
// Matches: PlayerName : [=] score [(delta)]
const SCORE_RE = /^([A-Za-z\u00C0-\u024F]+)\s*:\s*=?\s*([\+\-]?\d+(?:\.\d+)?)\s*(?:\(.*\))?\s*$/;

function parseDate(str) {
  str = str.trim();
  let m;
  // DD/MM/YYYY HH:MM
  if ((m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})$/)))
    return new Date(+m[3], +m[2] - 1, +m[1], +m[4], +m[5]);
  // "Hier à HH:MM" (French "yesterday at")
  if ((m = str.match(/hier\s+[àa]\s+(\d{1,2}):(\d{2})/i))) {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    d.setHours(+m[1], +m[2], 0, 0);
    return d;
  }
  // HH:MM (today)
  if ((m = str.match(/^(\d{1,2}):(\d{2})$/))) {
    const d = new Date();
    d.setHours(+m[1], +m[2], 0, 0);
    return d;
  }
  return null;
}

function parse(text) {
  const dataPoints = [];
  const knownPlayers = new Set();
  let date = null;
  let pending = Object.create(null);

  function commit() {
    if (Object.keys(pending).length >= 2) {
      dataPoints.push({ date, scores: Object.assign(Object.create(null), pending) });
      Object.keys(pending).forEach(p => knownPlayers.add(p));
      pending = Object.create(null);
    }
  }

  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line) continue;

    // Detect message header (author — timestamp)
    const eIdx = line.indexOf('—');
    if (eIdx > 0) {
      const d = parseDate(line.slice(eIdx + 1));
      if (d) { commit(); date = d; continue; }
    }

    // Detect score line
    const m = line.match(SCORE_RE);
    if (m) {
      const name = m[1].charAt(0).toUpperCase() + m[1].slice(1).toLowerCase();
      pending[name] = parseFloat(m[2]);
    }
  }
  commit();

  return { dataPoints, players: [...knownPlayers] };
}

// ── Rendering ─────────────────────────────────────────────────────────────────
const PALETTE = ['#4fc3f7', '#ef9a9a', '#a5d6a7', '#ffcc80', '#ce93d8'];
let chart = null;
let parsedState = { dataPoints: [], players: [] };
let manualGames = [];
let currentMerged = { dataPoints: [], players: [] };

function normalizeName(name) {
  // Whitelist: letters (basic + extended Latin), digits, spaces, hyphens, apostrophes.
  // Strips everything else (including < > " ' & _ and prototype-key characters).
  const cleaned = String(name)
    .trim()
    .replace(/[^A-Za-z\u00C0-\u024F0-9 '\-]/g, '')
    .replace(/\s+/g, ' ')
    .trim()
    .slice(0, 50);
  if (!cleaned) return '';
  return cleaned
    .split(' ')
    .filter(Boolean)
    .map(part => part.charAt(0).toUpperCase() + part.slice(1).toLowerCase())
    .join(' ');
}

function buildMergedData() {
  const mergedPoints = parsedState.dataPoints.map(dp => ({
    date: dp.date,
    scores: { ...dp.scores }
  }));

  const playersSet = new Set(parsedState.players);
  for (const game of manualGames) {
    Object.keys(game.deltas).forEach(p => playersSet.add(p));
  }

  const players = [...playersSet];

  if (mergedPoints.length === 0 && manualGames.length > 0) {
    const zeroScores = Object.assign(Object.create(null), Object.fromEntries(players.map(p => [p, 0])));
    mergedPoints.push({ date: null, scores: zeroScores });
  }

  for (const game of manualGames) {
    const lastScores = mergedPoints.length > 0
      ? Object.assign(Object.create(null), mergedPoints[mergedPoints.length - 1].scores)
      : Object.assign(Object.create(null), Object.fromEntries(players.map(p => [p, 0])));

    players.forEach(p => {
      if (lastScores[p] === undefined) lastScores[p] = 0;
    });

    for (const [name, delta] of Object.entries(game.deltas)) {
      lastScores[name] += delta;
    }

    mergedPoints.push({ date: game.date, scores: lastScores });
  }

  return { dataPoints: mergedPoints, players };
}

function renderCurrentState() {
  const merged = buildMergedData();
  currentMerged = merged;
  if (merged.dataPoints.length < 2 || merged.players.length < 2) {
    document.getElementById('results').style.display = 'none';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }

  render(merged.dataPoints, merged.players);
  document.getElementById('results').style.display = 'block';
}

function seedManualNames() {
  if (parsedState.players.length === 0) return;
  const inputs = [
    document.getElementById('mName1'),
    document.getElementById('mName2'),
    document.getElementById('mName3')
  ];

  parsedState.players.slice(0, 3).forEach((name, i) => {
    if (!inputs[i].value.trim()) inputs[i].value = name;
  });
}

function updateManualMeta() {
  const el = document.getElementById('manualMeta');
  if (manualGames.length === 0) {
    el.textContent = 'No manual games added yet.';
    return;
  }

  const latest = manualGames[manualGames.length - 1];
  const latestText = Object.entries(latest.deltas)
    .map(([p, v]) => `${p} ${fmtScore(v)}`)
    .join(' | ');
  el.textContent = `${manualGames.length} manual game${manualGames.length !== 1 ? 's' : ''} added. Latest: ${latestText}`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function fmtDate(d) {
  if (!d) return '';
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }) + ' ' +
         d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function fmtScore(v) {
  if (v === undefined || v === null) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(1);
}

function scoreClass(v) {
  return v > 0 ? 'positive' : v < 0 ? 'negative' : 'neutral';
}

function getLatestResults(dataPoints, players) {
  if (dataPoints.length < 2) return [];
  const last = dataPoints[dataPoints.length - 1];
  const prev = dataPoints[dataPoints.length - 2];
  return players
    .map(p => ({
      name: p,
      total: last.scores[p] ?? 0,
      delta: (last.scores[p] ?? 0) - (prev.scores[p] ?? 0)
    }))
    .sort((a, b) => b.total - a.total);
}

function render(dataPoints, players) {
  const colorMap = Object.fromEntries(players.map((p, i) => [p, PALETTE[i % PALETTE.length]]));
  const labels = dataPoints.map((_, i) => i === 0 ? 'Start' : `G${i}`);
  const latestIndex = dataPoints.length - 1;

  // Destroy previous chart instance
  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels,
      datasets: players.map(p => ({
        label: p,
        data: dataPoints.map(dp => dp.scores[p] ?? null),
        borderColor: colorMap[p],
        backgroundColor: colorMap[p] + '18',
        tension: 0.35,
        pointRadius: ctx => ctx.dataIndex === latestIndex ? 10 : 4,
        pointHoverRadius: ctx => ctx.dataIndex === latestIndex ? 14 : 7,
        pointBorderWidth: ctx => ctx.dataIndex === latestIndex ? 4 : 1,
        pointBackgroundColor: ctx => ctx.dataIndex === latestIndex ? '#fff' : colorMap[p],
        pointBorderColor: colorMap[p],
        borderWidth: 3,
        fill: false,
        spanGaps: true,
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: {
            color: '#f5e7c1',
            font: { size: 14, weight: '700', family: "'M PLUS Rounded 1c', sans-serif" },
            padding: 20,
            usePointStyle: true,
          }
        },
        tooltip: {
          backgroundColor: '#1a1b2f',
          borderColor: '#d4af37',
          borderWidth: 2,
          cornerRadius: 12,
          titleColor: '#f5e7c1',
          bodyColor: '#fff',
          padding: 15,
          callbacks: {
            title: items => {
              const dp = dataPoints[items[0].dataIndex];
              const gameLabel = items[0].dataIndex === 0 ? 'Start' : `Game ${items[0].dataIndex}`;
              return dp.date ? `${gameLabel}  ·  ${fmtDate(dp.date)}` : gameLabel;
            },
            label: item => {
              const v = item.raw;
              return `  ${item.dataset.label}: ${fmtScore(v)}`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#8890c0', font: { size: 12, weight: '600' } },
          grid: { color: 'rgba(255,255,255,0.05)' }
        },
        y: {
          ticks: {
            color: '#8890c0',
            font: { size: 12, weight: '600' },
            callback: v => (v >= 0 ? '+' : '') + v
          },
          grid: {
            color: ctx => ctx.tick.value === 0 ? 'rgba(212,175,55,0.4)' : 'rgba(255,255,255,0.05)',
            lineWidth: ctx => ctx.tick.value === 0 ? 2 : 1
          }
        }
      }
    }
  });

  // Standings
  const last = dataPoints[dataPoints.length - 1];
  const prev = dataPoints.length >= 2 ? dataPoints[dataPoints.length - 2] : null;

  const sorted = players
    .map(p => ({
      name: p,
      score: last.scores[p] ?? 0,
      delta: prev != null ? ((last.scores[p] ?? 0) - (prev.scores[p] ?? 0)) : null,
      color: colorMap[p]
    }))
    .sort((a, b) => b.score - a.score);

  const rankLabels = ['1ST PLACE', '2ND PLACE', '3RD PLACE', '4TH PLACE', '5TH PLACE'];

  document.getElementById('standings').innerHTML = sorted.map((p, i) =>
    `<div class="player-card${i === 0 ? ' first' : ''}">
      <div class="prank">${rankLabels[i] || (i + 1) + 'TH'}</div>
      <div class="pname" style="color:var(--lacquer-red)">${escHtml(p.name)}</div>
      <div class="pscore" style="color:${escHtml(p.color)}; -webkit-text-stroke: 1px rgba(0,0,0,0.1)">${fmtScore(p.score)}</div>
      ${p.delta !== null
        ? `<div class="pdelta" style="margin-top:10px; font-size: 0.9rem; color:var(--brown)">LAST GAME <span class="${scoreClass(p.delta)}" style="font-weight:800">${fmtScore(p.delta)}</span></div>`
        : ''}
    </div>`
  ).join('');

  const gameCount = dataPoints.length - 1; 
  document.getElementById('meta').textContent =
    `TOTAL ${gameCount} GAMES RECORDED`;
}

function exportGraphCard() {
  if (!chart || currentMerged.dataPoints.length < 2) return;

  // Load emotes from inlined data URIs (avoids file:// canvas taint)
  function loadImg(src) {
    return new Promise(res => {
      const img = new Image();
      img.onload = () => res(img);
      img.onerror = () => res(null);
      img.src = src;
    });
  }

  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  Promise.all([loadImg(pick(EMOTES_1ST)), loadImg(pick(EMOTES_2ND)), loadImg(pick(EMOTES_3RD))])
    .then(emotes => _drawCard(emotes))
    .catch(err => console.error('Export failed:', err));
}

function _drawCard(emotes) {
  const { dataPoints, players } = currentMerged;
  const latestResults = getLatestResults(dataPoints, players);
  const gameNumber = dataPoints.length - 1;

  const CW = 1920, CH = 1080;
  const card = document.createElement('canvas');
  card.width = CW;
  card.height = CH;
  const ctx = card.getContext('2d');

  // ── Background (Lacquer & Gold) ─────────────────────────────────────────────
  const bg = ctx.createLinearGradient(0, 0, CW, CH);
  bg.addColorStop(0,    '#2d0a0e');
  bg.addColorStop(0.5,  '#4a1c1c');
  bg.addColorStop(1,    '#1a1b2f');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, CW, CH);

  // Decorative gold lines
  ctx.strokeStyle = 'rgba(212,175,55,0.15)';
  ctx.lineWidth = 2;
  for (let i = 0; i < CW + CH; i += 60) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i - CH, CH); ctx.stroke();
  }

  const PAD = 40;
  // Inner frame
  ctx.strokeStyle = '#d4af37';
  ctx.lineWidth = 8;
  ctx.strokeRect(PAD, PAD, CW - PAD * 2, CH - PAD * 2);
  ctx.lineWidth = 2;
  ctx.strokeRect(PAD + 12, PAD + 12, CW - PAD * 2 - 24, CH - PAD * 2 - 24);

  // ── Header (Gacha Style) ────────────────────────────────────────────────────
  const IX = PAD + 60; 
  
  // Large Title
  ctx.save();
  ctx.font = 'bold 90px "M PLUS Rounded 1c", "Segoe UI", sans-serif';
  const title = '✦ PARLOIR RUBIS SAPHIR ✦';
  const tw = ctx.measureText(title).width;
  
  // Text Gradient
  const tGrad = ctx.createLinearGradient(IX, 60, IX, 150);
  tGrad.addColorStop(0, '#ffcc33');
  tGrad.addColorStop(0.5, '#ff8800');
  tGrad.addColorStop(1, '#ee4400');
  
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 14;
  ctx.lineJoin = 'round';
  ctx.strokeText(title, IX, 140);
  ctx.fillStyle = tGrad;
  ctx.fillText(title, IX, 140);
  ctx.restore();

  ctx.fillStyle = '#f5e7c1';
  ctx.font = '600 32px "M PLUS Rounded 1c", sans-serif';
  ctx.fillText(`GAME REPORT #${gameNumber}  ·  ${fmtDate(new Date())}`, IX, 195);

  // ── Player Chips ─────────────────────────────────────────────────────────────
  const CHIP_TOP    = 240;
  const CHIP_H      = 320;
  const CHIP_BOTTOM = CHIP_TOP + CHIP_H;
  const CHIP_GAP    = 30;
  const CHIPS_W     = CW - 2 * IX;
  const CHIP_W      = (CHIPS_W - CHIP_GAP * 2) / 3;

  const RANK_LABELS  = ['1ST PLACE', '2ND PLACE', '3RD PLACE'];
  const RANK_COLORS  = ['#d4af37', '#b0b0cc', '#b07040'];

  latestResults.slice(0, 3).forEach((p, i) => {
    const cx = IX + i * (CHIP_W + CHIP_GAP);
    const cy = CHIP_TOP;
    const playerColor = PALETTE[players.indexOf(p.name) % PALETTE.length];

    // Chip Background (Parchment)
    ctx.save();
    ctx.fillStyle = '#fbf5e6';
    ctx.shadowBlur = 30;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    // Rounded rect
    const r = 30;
    ctx.beginPath();
    ctx.moveTo(cx+r, cy); ctx.lineTo(cx+CHIP_W-r, cy); ctx.quadraticCurveTo(cx+CHIP_W, cy, cx+CHIP_W, cy+r);
    ctx.lineTo(cx+CHIP_W, cy+CHIP_H-r); ctx.quadraticCurveTo(cx+CHIP_W, cy+CHIP_H, cx+CHIP_W-r, cy+CHIP_H);
    ctx.lineTo(cx+r, cy+CHIP_H); ctx.quadraticCurveTo(cx, cy+CHIP_H, cx, cy+CHIP_H-r);
    ctx.lineTo(cx, cy+r); ctx.quadraticCurveTo(cx, cy, cx+r, cy);
    ctx.closePath();
    ctx.fill();
    
    // Lacquer Border
    ctx.strokeStyle = i === 0 ? '#d4af37' : '#4a2c2a';
    ctx.lineWidth = i === 0 ? 10 : 6;
    ctx.stroke();
    ctx.restore();

    // Emote overlay
    const emote = emotes[i];
    if (emote) {
      const eH = CHIP_H * 0.85;
      const eW = eH * (emote.width / emote.height);
      ctx.save();
      ctx.globalAlpha = 0.8;
      ctx.drawImage(emote, cx + CHIP_W - eW - 10, cy + (CHIP_H - eH) / 2, eW, eH);
      ctx.restore();
    }

    // Rank Badge
    ctx.fillStyle = RANK_COLORS[i];
    ctx.font = '800 24px "M PLUS Rounded 1c", sans-serif';
    ctx.fillText(RANK_LABELS[i], cx + 25, cy + 45);

    // Name
    ctx.fillStyle = '#8b1e2f'; // Lacquer red name
    ctx.font = '800 52px "M PLUS Rounded 1c", sans-serif';
    ctx.fillText(p.name, cx + 25, cy + 110);

    // Result Values
    const deltaColor = p.delta > 0 ? '#2b8a3e' : p.delta < 0 ? '#c92a2a' : '#4a2c2a';
    
    ctx.fillStyle = '#4a2c2a';
    ctx.font = '700 20px "M PLUS Rounded 1c", sans-serif';
    ctx.fillText('THIS GAME', cx + 25, cy + 160);
    ctx.fillStyle = deltaColor;
    ctx.font = '800 50px "M PLUS Rounded 1c", sans-serif';
    ctx.fillText(fmtScore(p.delta), cx + 25, cy + 215);

    ctx.fillStyle = '#4a2c2a';
    ctx.font = '700 20px "M PLUS Rounded 1c", sans-serif';
    ctx.fillText('TOTAL SCORE', cx + 25, cy + 255);
    ctx.fillStyle = playerColor;
    ctx.font = '800 50px "M PLUS Rounded 1c", sans-serif';
    ctx.fillText(fmtScore(p.total), cx + 25, cy + 305);
  });

  // ── Chart Area ──────────────────────────────────────────────────────────────
  const chartX = IX;
  const chartY = CHIP_BOTTOM + 50;
  const chartW = CW - 2 * IX;
  const chartH = CH - chartY - PAD - 40;

  ctx.save();
  ctx.fillStyle = 'rgba(14, 14, 26, 0.85)';
  const cr = 30;
  ctx.beginPath();
  ctx.moveTo(chartX+cr, chartY); ctx.lineTo(chartX+chartW-cr, chartY); ctx.quadraticCurveTo(chartX+chartW, chartY, chartX+chartW, chartY+cr);
  ctx.lineTo(chartX+chartW, chartY+chartH-cr); ctx.quadraticCurveTo(chartX+chartW, chartY+chartH, chartX+chartW-cr, chartY+chartH);
  ctx.lineTo(chartX+cr, chartY+chartH); ctx.quadraticCurveTo(chartX, chartY+chartH, chartX, chartY+chartH-cr);
  ctx.lineTo(chartX, chartY+cr); ctx.quadraticCurveTo(chartX, chartY, chartX+cr, chartY);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#d4af37';
  ctx.lineWidth = 4;
  ctx.stroke();
  ctx.restore();

  ctx.drawImage(chart.canvas, chartX + 20, chartY + 20, chartW - 40, chartH - 40);

  // Labels on points (same logic as before but with gacha styling)
  const scaleX = (chartW - 40) / chart.canvas.width;
  const scaleY = (chartH - 40) / chart.canvas.height;
  const lastIndex = dataPoints.length - 1;

  ctx.save();
  ctx.beginPath();
  ctx.rect(chartX + 20, chartY + 20, chartW - 40, chartH - 40);
  ctx.clip();

  players.forEach((p, i) => {
    const meta = chart.getDatasetMeta(i);
    const point = meta.data[lastIndex];
    if (!point) return;

    const px = (chartX + 20) + point.x * scaleX;
    const py = (chartY + 20) + point.y * scaleY;
    const color = String(meta.dataset.borderColor || PALETTE[i % PALETTE.length]);

    ctx.beginPath();
    ctx.fillStyle = color + '55';
    ctx.arc(px, py, 30, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#fff';
    ctx.arc(px, py, 18, 0, Math.PI * 2);
    ctx.stroke();

    const latest = latestResults.find(r => r.name === p);
    if (latest) {
      const label = `${p}  ${fmtScore(latest.delta)}`;
      ctx.font = 'bold 24px "M PLUS Rounded 1c", sans-serif';
      const tw = ctx.measureText(label).width;
      const PILL_PAD = 12;
      let lx = px + 25;
      if (lx + tw + PILL_PAD * 2 > chartX + chartW - 20) lx = px - tw - PILL_PAD * 2 - 25;
      
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.beginPath();
      const r = 12;
      const lY = py - 20;
      ctx.roundRect(lx - PILL_PAD, lY - 24, tw + PILL_PAD * 2, 40, r);
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      
      ctx.fillStyle = '#3d2422';
      ctx.fillText(label, lx, lY + 6);
    }
  });
  ctx.restore();

  // ── Download ────────────────────────────────────────────────────────────────
  const a = document.createElement('a');
  a.href = card.toDataURL('image/png');
  a.download = `mahjonj-report-game${gameNumber}.png`;
  a.click();
}

// ── Controls ──────────────────────────────────────────────────────────────────
function run() {
  const text = document.getElementById('input').value;
  const err = document.getElementById('error');
  err.style.display = 'none';

  if (!text.trim()) {
    err.textContent = 'Paste some Discord messages first.';
    err.style.display = 'block';
    return;
  }

  if (text.length > 200_000) {
    err.textContent = 'Input too large (max 200 000 characters).';
    err.style.display = 'block';
    return;
  }

  const { dataPoints, players } = parse(text);

  if (dataPoints.length < 2) {
    err.textContent = 'Not enough score entries found. Check that the format matches.';
    err.style.display = 'block';
    return;
  }

  parsedState = { dataPoints, players };
  seedManualNames();
  renderCurrentState();
}

function addManualGame() {
  const err = document.getElementById('manualError');
  err.style.display = 'none';

  const rows = [1, 2, 3].map(i => ({
    name: normalizeName(document.getElementById(`mName${i}`).value),
    deltaRaw: document.getElementById(`mDelta${i}`).value.trim()
  }));

  if (rows.some(r => !r.name || !r.deltaRaw)) {
    err.textContent = 'Fill all 3 player names and 3 game values.';
    err.style.display = 'block';
    return;
  }

  const lowerNames = rows.map(r => r.name.toLowerCase());
  if (new Set(lowerNames).size !== 3) {
    err.textContent = 'Player names must be unique for the game.';
    err.style.display = 'block';
    return;
  }

  const deltas = {};
  for (const row of rows) {
    const v = parseFloat(row.deltaRaw.replace(',', '.'));
    if (!Number.isFinite(v) || Math.abs(v) > 9999) {
      err.textContent = 'Game values must be valid numbers between -9999 and +9999.';
      err.style.display = 'block';
      return;
    }
    deltas[row.name] = v;
  }

  manualGames.push({ date: new Date(), deltas });
  updateManualMeta();
  renderCurrentState();
}

function loadSample() {
  document.getElementById('input').value = SAMPLE;
  run();
}

function clearManualGames() {
  manualGames = [];
  document.getElementById('manualError').style.display = 'none';
  updateManualMeta();
  renderCurrentState();
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('error').style.display = 'none';
  document.getElementById('manualError').style.display = 'none';

  ['mName1', 'mName2', 'mName3', 'mDelta1', 'mDelta2', 'mDelta3']
    .forEach(id => { document.getElementById(id).value = ''; });

  parsedState = { dataPoints: [], players: [] };
  manualGames = [];
  currentMerged = { dataPoints: [], players: [] };
  updateManualMeta();

  document.getElementById('results').style.display = 'none';
  if (chart) { chart.destroy(); chart = null; }
}

// ── Supabase Logic ──────────────────────────────────────────────────────────
async function fetchGlobalHistory() {
  if (!supabase) return;
  const container = document.getElementById('globalHistory');
  
  try {
    const { data, error } = await supabase
      .from('matches')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(10);

    if (error) throw error;

    if (!data || data.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding: 20px; opacity: 0.5;">No global matches recorded yet. Be the first!</div>';
      return;
    }

    let html = '<table class="history-table"><thead><tr><th>DATE</th><th>PLAYERS & SCORES</th><th>GAMES</th></tr></thead><tbody>';
    data.forEach(m => {
      const date = new Date(m.created_at).toLocaleDateString();
      const players = m.player_data.map(p => `${p.name} (${p.delta > 0 ? '+' : ''}${p.delta})`).join(', ');
      html += `<tr>
        <td class="history-date">${date}</td>
        <td class="history-players">${players}</td>
        <td>${m.match_count}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  } catch (err) {
    console.error('Supabase fetch error:', err);
    container.innerHTML = '<div style="text-align:center; padding: 20px; color: var(--lacquer-red);">Failed to load global history.</div>';
  }
}

async function submitToGlobal(btn) {
  if (!supabase || !currentMerged.dataPoints.length) return;
  const originalText = btn.innerHTML;
  
  try {
    btn.disabled = true;
    btn.innerHTML = '<span>⏳</span> UPLOADING...';

    // Prepare data
    const players = currentMerged.players;
    const latestResults = getLatestResults(currentMerged.dataPoints, players);
    const matchCount = currentMerged.dataPoints.length - 1;

    const { error } = await supabase
      .from('matches')
      .insert([
        { 
          player_data: latestResults,
          match_count: matchCount 
        }
      ]);

    if (error) throw error;

    btn.style.background = '#2b8a3e';
    btn.innerHTML = '<span>✅</span> PUBLISHED!';
    fetchGlobalHistory(); // Refresh list
    
    setTimeout(() => {
      btn.disabled = false;
      btn.innerHTML = originalText;
    }, 3000);

  } catch (err) {
    console.error('Supabase insert error:', err);
    alert('Failed to publish. Check your connection or database RLS settings.');
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
}

// Helper to get latest results for DB storage
function getLatestResults(dataPoints, players) {
  const lastDP = dataPoints[dataPoints.length - 1];
  return players.map(name => ({
    name: name,
    delta: lastDP[name] || 0
  })).sort((a, b) => b.delta - a.delta);
}

// Initial Load
document.addEventListener('DOMContentLoaded', fetchGlobalHistory);
